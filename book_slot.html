<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Slot</title>

  <!-- ✅ AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    p {
      margin: 10px 0;
      color: #555;
      font-size: 16px;
    }

    form {
      margin-top: 20px;
    }

    button {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #0056b3;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #007bff;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container" data-aos="zoom-in">
    <h2 data-aos="fade-down">Book Slot</h2>

    <p data-aos="fade-right"><strong>Date:</strong> {{ slot.date }}</p>
    <p data-aos="fade-left"><strong>Time:</strong> {{ slot.time }}</p>

    <form method="POST" data-aos="fade-up">
      <p><strong>Payment:</strong> ₹500</p>
      <button type="submit">Pay & Book Appointment</button>
    </form>

    <a href="{{ url_for('patient.dashboard') }}" data-aos="fade-up">Cancel</a>
  </div>

  <!-- ✅ AOS Script -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ once: true });
  </script>

</body>
</html>
