<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate Your Doctor</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --error: #f43f5e;
      --dark: #1e293b;
      --light: #f8fafc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rating-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 500px;
      position: relative;
      overflow: hidden;
    }

    .rating-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
    }

    .doctor-icon {
      text-align: center;
      font-size: 60px;
      color: var(--primary);
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h2 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 25px;
      font-size: 28px;
    }

    .rating-stars {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
    }

    .star {
      font-size: 36px;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .star:hover {
      transform: scale(1.2);
    }

    .star.active {
      color: #fbbf24;
      animation: pulse 0.5s;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      resize: vertical;
      min-height: 100px;
    }

    .submit-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
      margin-top: 20px;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(79, 70, 229, 0.3);
    }

    .submit-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .error-message {
      color: var(--error);
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }

    .thank-you {
      text-align: center;
      padding: 20px;
      display: none;
      animation: fadeIn 0.6s;
    }

    .spinner {
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="rating-card">
    <div class="doctor-icon">
      <i class="fas fa-user-md"></i>
    </div>

    <h2>How was your experience?</h2>

    <form method="POST" id="ratingForm">
      <div class="rating-stars">
        <i class="fas fa-star star" data-value="1"></i>
        <i class="fas fa-star star" data-value="2"></i>
        <i class="fas fa-star star" data-value="3"></i>
        <i class="fas fa-star star" data-value="4"></i>
        <i class="fas fa-star star" data-value="5"></i>
      </div>

      <input type="hidden" name="rating" id="actualRating" required>

      <label for="review"><strong>Your Review (optional)</strong></label>
      <textarea name="review" id="review" placeholder="Write your thoughts here..."></textarea>

      <button type="submit" class="submit-btn" id="submitBtn">
        Submit Feedback
      </button>
      <div class="error-message" id="errorMsg">
        Please select a rating
      </div>
    </form>

    <div class="thank-you" id="thankYou">
      <h3>Thank You! <i class="fas fa-heart" style="color: #f43f5e;"></i></h3>
      <p>Your feedback helps us improve our service.</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const stars = document.querySelectorAll('.star');
      const actualRating = document.getElementById('actualRating');
      const form = document.getElementById('ratingForm');
      const submitBtn = document.getElementById('submitBtn');
      const thankYou = document.getElementById('thankYou');
      const errorMsg = document.getElementById('errorMsg');

      stars.forEach(star => {
        star.addEventListener('click', function () {
          const value = this.getAttribute('data-value');
          actualRating.value = value;

          stars.forEach((s, idx) => {
            if (idx < value) {
              s.classList.add('active');
            } else {
              s.classList.remove('active');
            }
          });

          errorMsg.style.display = 'none';
        });
      });

      form.addEventListener('submit', function (e) {
        if (!actualRating.value) {
          e.preventDefault();
          errorMsg.style.display = 'block';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner spinner"></i> Submitting...';

        setTimeout(() => {
          thankYou.style.display = 'block';
          form.style.display = 'none';
        }, 1500);
      });
    });
  </script>
</body>
</html>
