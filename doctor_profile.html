<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Profile</title>

  <!-- ✅ AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 50px 20px;
    }

    .profile-box {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #007bff;
      font-weight: 600;
      text-align: center;
    }

    p {
      margin: 10px 0;
      font-size: 16px;
      color: #333;
    }

    h3 {
      margin-top: 30px;
      color: #333;
      border-bottom: 2px solid #007bff;
      padding-bottom: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    ul li {
      background: #f8f9fa;
      margin-bottom: 10px;
      padding: 12px 15px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    ul li:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    ul li a {
      background: #007bff;
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.3s ease;
      font-size: 14px;
    }

    ul li a:hover {
      background: #0056b3;
    }

    .empty {
      text-align: center;
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="profile-box" data-aos="fade-up" data-aos-duration="1000">
    <h2>Doctor Profile</h2>
    <p><strong>Email:</strong> {{ doctor.email }}</p>
    <p><strong>Specialization:</strong> {{ doctor.specialization or 'N/A' }}</p>

    <h3>Available Slots</h3>
    <ul>
      {% for slot in slots %}
        <li data-aos="fade-up" data-aos-delay="{{ loop.index * 100 }}">
          {{ slot.date }} {{ slot.time }}
          <a href="{{ url_for('patient.book_slot', slot_id=slot._id) }}">Book</a>
        </li>
      {% else %}
        <li class="empty">No slots available.</li>
      {% endfor %}
    </ul>
  </div>

  <!-- ✅ AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
