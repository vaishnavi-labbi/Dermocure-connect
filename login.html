<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | SkinScan Pro</title>
  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f4f8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxkZWZzPjxwYXR0ZXJuIGlkPSJwYXR0ZXJuIiB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiIHBhdHRlcm5UcmFuc2Zvcm09InJvdGF0ZSg0NSkiPjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0icmdiYSgyMDQsMjMyLDI1NSwwLjA1KSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3QgZmlsbD0idXJsKCNwYXR0ZXJuKSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIvPjwvc3ZnPg==');
      opacity: 0.6;
      z-index: -1;
    }

    form {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(31, 102, 135, 0.15);
      transform: translateY(0);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    form:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(31, 102, 135, 0.25);
    }

    form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #4CAF50, #8BC34A, #FFC107, #FF9800, #FF5722);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #2E7D32;
      font-size: 28px;
      font-weight: 700;
      position: relative;
      letter-spacing: 0.5px;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      margin: 12px auto;
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    h2:hover::after {
      width: 100px;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo svg {
      width: 60px;
      height: 60px;
      fill: #2E7D32;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
      color: #455A64;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: color 0.3s ease;
    }

    label:hover {
      color: #4CAF50;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #B0BEC5;
      border-radius: 6px;
      outline: none;
      font-size: 15px;
      transition: all 0.3s ease;
      background: rgba(236, 239, 241, 0.3);
    }

    input:focus {
      border-color: #4CAF50;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      border: none;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: linear-gradient(135deg, #43A047 0%, #1B5E20 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    button:focus:not(:active)::after {
      animation: ripple 1s ease-out;
    }

    @keyframes ripple {
      0% {
        transform: scale(0, 0);
        opacity: 0.5;
      }
      100% {
        transform: scale(20, 20);
        opacity: 0;
      }
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    p {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #546E7A;
    }

    a {
      color: #2E7D32;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #4CAF50;
      text-decoration: underline;
    }

    .medical-note {
      font-size: 12px;
      color: #78909C;
      text-align: center;
      margin-top: 30px;
      padding-top: 15px;
      border-top: 1px solid #CFD8DC;
    }
  </style>
</head>
<body>
  <form method="POST" data-aos="zoom-in" data-aos-duration="900">
    {% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class="flash-messages">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

    <div class="logo" data-aos="fade-down" data-aos-duration="600">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
        <path d="M7 12h2v5H7zm4-7h2v12h-2zm4 5h2v7h-2z"/>
      </svg>
    </div>
    
    <h2 data-aos="fade-down" data-aos-duration="600">Login</h2>

    <label data-aos="fade-right" data-aos-delay="100">Email:</label>
    <input type="email" name="email" required data-aos="fade-right" data-aos-delay="150" placeholder="your@email.com">

    <label data-aos="fade-right" data-aos-delay="200">Password:</label>
   <input type="password" name="password" required data-aos="fade-right" data-aos-delay="250">
    <button type="submit" data-aos="fade-up" data-aos-delay="300">Analyze & Login</button>

    <div class="links" data-aos="fade-up" data-aos-delay="400">
      <a href="{{ url_for('auth.forgot_password') }}">Forgot Password?</a>
      <a href="{{ url_for('auth.register') }}">Create Account</a>
    </div>

    <p class="medical-note" data-aos="fade-up" data-aos-delay="500">
      For medical professionals only. Early detection saves lives.
    </p>
  </form>

  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 900,
      easing: 'ease-out-cubic',
      once: true
    });
  </script>
</body>
</html>
