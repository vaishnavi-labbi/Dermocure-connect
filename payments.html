<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment</title>

  <!-- ✅ AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .payment-box {
      background: #fff;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .payment-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #28a745;
      font-weight: 600;
    }

    p {
      margin: 10px 0;
      color: #333;
      font-size: 16px;
    }

    button {
      background: #28a745;
      color: #fff;
      border: none;
      padding: 10px 25px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #1c7c31;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #dc3545;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #a71d2a;
    }
  </style>
</head>
<body>

  <div class="payment-box" data-aos="fade-up" data-aos-duration="1000">
    <h2>Payment</h2>

    <p>Date: {{ slot.date }}</p>
    <p>Time: {{ slot.time }}</p>
    <p>Amount: ₹500</p>

    <form method="POST">
      <button type="submit">Pay & Book Appointment</button>
    </form>

    <p><a href="{{ url_for('patient.dashboard') }}">Cancel</a></p>
  </div>

  <!-- ✅ AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
