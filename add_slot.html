<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Slot | Doctor Portal</title>

  <!-- ✅ AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3a56d4;
      --secondary: #4cc9f0;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --border-radius: 12px;
      --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--dark);
    }

    .slot-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    h2 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 30px;
      font-weight: 600;
      position: relative;
      padding-bottom: 15px;
    }
    
    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    label i {
      color: var(--primary);
      width: 20px;
      text-align: center;
    }

    input[type="date"],
    input[type="time"] {
      padding: 12px 15px;
      border: 1px solid #e0e0e0;
      border-radius: var(--border-radius);
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: var(--transition);
    }
    
    input[type="date"]:focus,
    input[type="time"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }

    button {
      padding: 14px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border: none;
      border-radius: var(--border-radius);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
    }

    button:hover {
      background: linear-gradient(90deg, var(--primary-dark), #3ab9e0);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .card {
        padding: 30px 20px;
      }
      
      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="slot-container">
    <div class="card" data-aos="zoom-in" data-aos-duration="800">
      <h2><i class="far fa-calendar-plus"></i> Add New Slot</h2>
      <form method="POST">
        <div class="form-group">
          <label for="date">
            <i class="far fa-calendar-alt"></i> Date:
          </label>
          <input type="date" name="date" required>
        </div>
        
        <div class="form-group">
          <label for="time">
            <i class="far fa-clock"></i> Time:
          </label>
          <input type="time" name="time" required>
        </div>

        <button type="submit">
          <i class="fas fa-plus-circle"></i> Add Slot
        </button>
      </form>
    </div>
  </div>

  <!-- ✅ AOS Script -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ 
      once: true,
      duration: 800 
    });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const dateInput = document.querySelector('input[type="date"]');
    const timeInput = document.querySelector('input[type="time"]');

    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    dateInput.addEventListener('change', function() {
      const selectedDate = this.value;

      if (selectedDate === today) {
        const now = new Date();
        // Format current time as HH:MM
        const currentTime = now.toTimeString().split(':').slice(0,2).join(':');
        timeInput.setAttribute('min', currentTime);
      } else {
        timeInput.removeAttribute('min');
      }
    });
  });
</script>
</body>
</html>
