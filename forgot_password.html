<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | Doctor Appointment</title>

  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8; /* Light grey background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    form {
      background: #fff; /* White form card */
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.4s ease;
    }

    form:hover {
      transform: translateY(-8px);
    }

    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #17a2b8; /* Teal focus */
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      background: #007bff; /* Primary blue */
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #0056b3; /* Darker blue on hover */
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #007bff; /* Heading in primary blue */
    }
  </style>
</head>
<body>

  <form method="POST" data-aos="zoom-in">
    <h2 data-aos="fade-down">Forgot Password</h2>

    <label>Email:</label>
    <input type="email" name="email" required data-aos="fade-right">

    <button type="submit" data-aos="fade-up" data-aos-delay="100">Send OTP</button>
  </form>

  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
