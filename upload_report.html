<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Medical Report | Healthcare System</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --primary: #4361ee;
      --primary-light: #e0e7ff;
      --primary-dark: #3a0ca3;
      --secondary: #3f37c9;
      --success: #4cc9f0;
      --warning: #f8961e;
      --danger: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --white: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --rounded: 0.375rem;
      --rounded-lg: 0.5rem;
      --rounded-xl: 0.75rem;
      --rounded-full: 9999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #dfe7f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .upload-container {
      width: 100%;
      max-width: 500px;
    }

    .upload-card {
      background: var(--white);
      border-radius: var(--rounded-xl);
      box-shadow: var(--shadow-lg);
      padding: 3rem;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border-left: 5px solid var(--primary);
    }

    .upload-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }

    .upload-icon {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 1.5rem;
      display: inline-flex;
      width: 80px;
      height: 80px;
      background: var(--primary-light);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }

    h2 {
      color: var(--primary-dark);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .upload-description {
      color: var(--gray);
      margin-bottom: 2rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .file-upload-wrapper {
      position: relative;
      margin-bottom: 2rem;
    }

    .file-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border: 2px dashed #cbd5e0;
      border-radius: var(--rounded-lg);
      background: var(--light);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-upload-label:hover {
      border-color: var(--primary);
      background: rgba(67, 97, 238, 0.05);
    }

    .file-upload-label i {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .file-upload-label span {
      color: var(--gray);
      font-size: 0.9rem;
    }

    .file-upload-label strong {
      color: var(--primary);
      font-weight: 500;
    }

    input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .file-name {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .file-name i {
      color: var(--primary);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 2rem;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--rounded-full);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .upload-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .upload-btn:active {
      transform: translateY(0);
    }

    .upload-btn i {
      font-size: 1rem;
    }

    .file-requirements {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--gray);
      text-align: left;
    }

    .file-requirements ul {
      list-style: none;
      padding-left: 1.5rem;
    }

    .file-requirements li {
      position: relative;
      margin-bottom: 0.5rem;
    }

    .file-requirements li::before {
      content: '•';
      position: absolute;
      left: -1.5rem;
      color: var(--primary);
    }

    @media (max-width: 576px) {
      body {
        padding: 1.5rem;
      }
      
      .upload-card {
        padding: 2rem 1.5rem;
      }
      
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="upload-container" data-aos="fade-up" data-aos-duration="800">
    <div class="upload-card">
      <div class="upload-icon">
        <i class="fas fa-file-medical"></i>
      </div>
      <h2>Upload Medical Report</h2>
      <p class="upload-description">
        Please upload your medical report file. Supported formats include PDF, JPG, PNG, and DOCX.
      </p>

      <form method="POST" enctype="multipart/form-data" id="uploadForm">
        <div class="file-upload-wrapper">
          <label class="file-upload-label">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Drag & drop your file here or <strong>browse</strong></span>
            <input type="file" name="report" id="fileInput" required>
          </label>
          <div class="file-name" id="fileName">
            <i class="fas fa-info-circle"></i> No file selected
          </div>
        </div>

        <button type="submit" class="upload-btn">
          <i class="fas fa-upload"></i> Upload Report
        </button>
      </form>

      <div class="file-requirements">
        <p><strong>File requirements:</strong></p>
        <ul>
          <li>Maximum file size: 5MB</li>
          <li>Supported formats: PDF, JPG, PNG, DOCX</li>
          <li>File name should be descriptive</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      once: true,
      duration: 800,
      easing: 'ease-out-quart'
    });

    // File name display
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');

    fileInput.addEventListener('change', function() {
      if (this.files && this.files.length > 0) {
        fileNameDisplay.innerHTML = `<i class="fas fa-file"></i> ${this.files[0].name}`;
      } else {
        fileNameDisplay.innerHTML = '<i class="fas fa-info-circle"></i> No file selected';
      }
    });

    // Form submission feedback
    const uploadForm = document.getElementById('uploadForm');
    uploadForm.addEventListener('submit', function() {
      const uploadBtn = this.querySelector('button[type="submit"]');
      uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
      uploadBtn.disabled = true;
    });
  </script>
</body>
</html>
