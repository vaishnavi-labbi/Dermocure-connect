<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Doctor Appointment</title>

  <!-- AOS CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #a3bffa, #e6fffa);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    form {
      background: linear-gradient(145deg, #ffffff, #e0f2fe);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.15);
      transition: transform 0.6s, box-shadow 0.6s;
      position: relative;
    }

    form:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3);
    }

    form::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.7s;
    }

    form:hover::before {
      left: 100%;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #1e40af;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px; height: 4px;
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      margin: 10px auto 0;
      border-radius: 2px;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
      color: #1e40af;
      font-size: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #bfdbfe;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      background: #eff6ff;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #60a5fa;
      background: #ffffff;
      box-shadow: 0 0 10px rgba(96,165,250,0.3);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #1e40af, #3b82f6);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      z-index: 1;
    }

    button:hover {
      background: linear-gradient(45deg, #1e3a8a, #2563eb);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.5);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 3px 12px rgba(59,130,246,0.3);
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.7s ease, height 0.7s ease;
      z-index: -1;
    }

    button:hover::before {
      width: 400px; height: 400px;
    }

    #doctorFields {
      transition: opacity 0.6s ease, max-height 0.6s ease;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
    }

    #doctorFields.show {
      max-height: 1000px;
      opacity: 1;
      margin-bottom: 20px;
    }

    /* Login link style */
    .login-link {
      text-align: center;
      margin-top: 15px;
      color: #1e40af;
      font-size: 14px;
    }

    .login-link a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      form { padding: 25px 20px; }
      h2 { font-size: 24px; }
      button { font-size: 15px; }
      label { font-size: 14px; }
      input, select, textarea {
        font-size: 14px;
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      form { padding: 20px 15px; }
      h2 { font-size: 22px; }
      button { padding: 12px; }
    }
  </style>
</head>
<body>

  <form method="POST" data-aos="zoom-in" data-aos-duration="1000">
    <h2 data-aos="fade-down">Register</h2>

    <label data-aos="fade-right">Full Name:</label>
    <input type="text" name="full_name" required  pattern="[A-Za-z]" {2,15} title="character allowed only">
    <label data-aos="fade-right" data-aos-delay="150">Email:</label> 
    <input type="email" name="email" required data-aos="fade-right" data-aos-delay="200">

    <label data-aos="fade-right" data-aos-delay="250">Password:</label>
    <input 
    type="password" 
    name="password" 
    id="password"
    required 
    minlength="8"
    pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
    title="Password must be at least 8 characters long and include a number and a letter."
    data-aos="fade-right" 
    data-aos-delay="250"
  >
    <label data-aos="fade-right" data-aos-delay="350">Role:</label>
    <select name="role" id="role" required onchange="toggleDoctorFields()" data-aos="fade-right" data-aos-delay="400">
      <option value="patient">Patient</option>
      <!-- <option value="admin">admin</option> -->
      <option value="doctor">Doctor</option>
    </select>

    <label data-aos="fade-right" data-aos-delay="400">WhatsApp Number:</label>
    <input type="tel" name="phone_number" pattern="[0-9]{10}" placeholder="10-digit number" required data-aos="fade-right" data-aos-delay="450">

    <div id="doctorFields" data-aos="fade-up" data-aos-delay="500">
      <label>Specialization:</label>
      <input type="text" name="specialization">

      <label>All About You:</label>
      <textarea name="about"></textarea>

      <label>Hospital Name:</label>
      <input type="text" name="hospital_name">

      <label>Hospital Code:</label>
      <input type="text" name="hospital_code">

      <label>Doctor Code:</label>
      <input type="text" name="doctor_code">

      <label>Address:</label>
      <textarea name="address"></textarea>

      <label>Education:</label>
      <input type="text" name="education">

      <label>City:</label>
      <input type="text" name="city">
    </div>

    <button type="submit" data-aos="fade-up" data-aos-delay="600">Register</button>

    <p class="login-link">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Login here</a>
    </p>
  </form>

  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000, easing: 'ease-out-back', once: true });

    function toggleDoctorFields() {
      var role = document.getElementById('role').value;
      var doctorFields = document.getElementById('doctorFields');
      if (role === 'doctor') {
        doctorFields.classList.add('show');
      } else {
        doctorFields.classList.remove('show');
      }
    }
  </script>

</body>
</html>
